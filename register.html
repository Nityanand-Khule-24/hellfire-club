<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellFired Registration</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        body {
            background: black;
            color: white;
            font-family: 'Courier New', monospace;
        }

        .glow {
            text-shadow: 0 0 15px red;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        input {
            background: black;
            border: 1px solid #550000;
            padding: 10px;
            width: 100%;
            color: white;
        }
    </style>
</head>

<body>

    <div class="text-center py-10">
        <h1 class="text-4xl text-red-600 glow">UPSIDE DOWN REGISTRATION</h1>
    </div>

    <div class="max-w-3xl mx-auto card p-8 rounded-xl">
        <form id="form" class="space-y-6">

            <input type="text" id="team" placeholder="Team Name" required>
            <input type="email" id="email" placeholder="Team Email" required>

            <div class="grid grid-cols-2 gap-4">
                <input id="m1" placeholder="Member 1" required>
                <input id="p1" placeholder="Phone" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input id="m2" placeholder="Member 2" required>
                <input id="p2" placeholder="Phone" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input id="m3" placeholder="Member 3">
                <input id="p3" placeholder="Phone">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input id="m4" placeholder="Member 4">
                <input id="p4" placeholder="Phone">
            </div>

            <div class="text-center">
                <h2 class="text-red-500">Scan & Pay</h2>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAY" class="mx-auto w-40">
                <input id="utr" placeholder="UTR ID" required>
            </div>

            <input type="file" id="file" required>

            <button type="submit" class="w-full py-3 bg-red-600 rounded-lg">
                🔥 Register
            </button>

        </form>
    </div>

    <div id="idCard" style="display:none; margin-top:30px;"></div>

    <script>
        emailjs.init({
            publicKey: "dKtwUtnTWPBkqCxZP"
        });

        const supabaseClient = supabase.createClient(
            "https://iwicuuudunilgxcaxgnn.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3aWN1dXVkdW5pbGd4Y2F4Z25uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTkwMDksImV4cCI6MjA4OTY3NTAwOX0.zMKajvwA0QcJhHk63uovRZva4c6q_5wSD9WCeXeMjUA" // 🔥 PUT YOUR REAL KEY HERE
        );

        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            try {

                const file = document.getElementById("file").files[0];
                if (!file) return alert("Upload screenshot");

                const fileName = Date.now() + "_" + file.name;

                const { error: uploadError } = await supabaseClient.storage
                    .from("screenshots")
                    .upload(fileName, file);

                if (uploadError) return alert("Upload failed");

                const fileUrl =
                    "https://iwicuuudunilgxcaxgnn.supabase.co/storage/v1/object/public/screenshots/" + fileName;

                const teamID = "HFC-" + Math.random().toString(36).substring(2, 7).toUpperCase();

                const teamName = document.getElementById("team").value;
                const email = document.getElementById("email").value;

                const { error } = await supabaseClient.from("teams").insert([{
                    team_name: teamName,
                    team_id: teamID,
                    email: email,

                    m1: m1.value, p1: p1.value,
                    m2: m2.value, p2: p2.value,
                    m3: m3.value, p3: p3.value,
                    m4: m4.value, p4: p4.value,

                    utr: utr.value,
                    screenshot_url: fileUrl
                }]);

                if (error) return alert(error.message);

                alert("🔥 Registered!\nID: " + teamID);

                // ID CARD
                generateIDCard(teamID, teamName);

                // EMAIL
                const link = "https://hellfireclubscoe.netlify.app/id.html?id=" + teamID;

                emailjs.send("service_x4cte7o", "template_7yff2wj", {
                    team_name: teamName,
                    team_id: teamID,
                    email: email,
                    link: link
                })
                    .then((res) => {
                        console.log("SUCCESS", res);
                    })
                    .catch((err) => {
                        console.error("FAILED", err);
                    });

                document.getElementById("form").reset();

            } catch (err) {
                console.error(err);
                alert("Error occurred");
            }
        });

        function generateIDCard(teamID, teamName) {
            const qr = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + teamID;

            document.getElementById("idCard").innerHTML = `
<div style="width:300px;padding:20px;background:black;border:2px solid red;text-align:center">
<h2 style="color:red">HellFired Club</h2>
<p>${teamName}</p>
<p>${teamID}</p>
<img src="${qr}">
</div>
`;

            document.getElementById("idCard").style.display = "block";
        }
    </script>

</body>

</html>
