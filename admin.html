<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HellFired Admin Panel</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: #0a0a0a; color: white; font-family: 'Courier New', monospace; }
.glow { text-shadow:0 0 10px red,0 0 20px red,0 0 40px #ff003c; animation:flicker 2s infinite alternate; }
@keyframes flicker { 0% { opacity:1 } 100% { opacity:0.85 } }
.card { background: rgba(0,0,0,0.55); border:1px solid rgba(255,0,0,0.3); backdrop-filter: blur(18px); box-shadow:0 0 30px rgba(255,0,0,0.25); transition:0.4s; }
.card:hover { box-shadow:0 0 60px rgba(255,0,0,0.5); }
input, button { border-radius:6px; padding:8px; margin:4px 0; }
button { background:#ff003c; border:1px solid #ff003c; color:white; font-weight:bold; cursor:pointer; box-shadow:0 0 10px #ff003c,0 0 20px rgba(255,0,60,0.5); transition:0.3s; }
button:hover { box-shadow:0 0 20px #ff003c,0 0 40px #ff003c,0 0 60px rgba(255,0,60,0.7); transform: scale(1.05); }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { padding:8px; border:1px solid #ff003c; text-align:left; }
th { background-color:#220000; }
tr.present td { background-color: rgba(0,255,0,0.1); }
tr.absent td { background-color: rgba(255,0,0,0.1); }
.toggle-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
.toggle-switch input { display: none; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: #ff003c; }
input:checked + .slider:before { transform: translateX(26px); }
#idCardModal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:50; }
#idCardContent { background: rgba(0,0,0,0.9); border:2px solid red; padding:20px; border-radius:12px; text-align:center; position:relative; }
#closeCard { position:absolute; top:6px; right:10px; cursor:pointer; font-size:20px; color:red; }
</style>
</head>

<body>

<div class="text-center py-6">
  <h1 class="text-3xl glow">HellFireClub Admin Panel</h1>
</div>

<!-- Login Form -->
<div id="loginCard" class="max-w-md mx-auto card p-6 rounded-xl">
  <h2 class="text-red-500 mb-6 text-center text-xl glow">Admin Login</h2>
  <div class="mb-4">
    <input type="email" id="adminEmail" placeholder="Email" class="w-full block p-3 rounded-md text-black" />
  </div>
  <div class="mb-4">
    <input type="password" id="adminPass" placeholder="Password" class="w-full block p-3 rounded-md text-black" />
  </div>
  <div class="mb-2">
    <button id="loginBtn" class="w-full py-3">Login</button>
  </div>
  <p id="loginError" class="text-red-500 mt-2 text-center"></p>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none;">
  <div class="max-w-5xl mx-auto p-6">
    <h2 class="text-red-500 glow mb-4">QR Scan / Mark Attendance</h2>
    <div id="qr-reader" style="width:400px;"></div>

    <h2 class="text-red-500 glow mt-8 mb-2">Registered Teams</h2>
    <table id="teamsTable">
      <thead>
        <tr>
          <th>Team ID</th>
          <th>Team Name</th>
          <th>Email</th>
          <th>Attendance</th>
          <th>View ID</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ID Card Modal -->
<div id="idCardModal">
  <div id="idCardContent"><span id="closeCard">✖</span></div>
</div>

<!-- JS Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://iwicuuudunilgxcaxgnn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3aWN1dXVkdW5pbGd4Y2F4Z25uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTkwMDksImV4cCI6MjA4OTY3NTAwOX0.zMKajvwA0QcJhHk63uovRZva4c6q_5wSD9WCeXeMjUA"
);

const adminEmail = "admin@hellfired.com";
const adminPassword = "hellfire123";

const loginCard = document.getElementById("loginCard");
const dashboard = document.getElementById("dashboard");
const loginBtn = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");

loginBtn.addEventListener("click", () => {
  const email = document.getElementById("adminEmail").value;
  const pass = document.getElementById("adminPass").value;
  if(email === adminEmail && pass === adminPassword){
    loginCard.style.display = "none";
    dashboard.style.display = "block";
    loadTeams();
    initQRScanner();
  } else {
    loginError.textContent = "Invalid credentials!";
  }
});

// ---------------- Load Teams Table ----------------
async function loadTeams() {
  const { data, error } = await supabaseClient.from("teams").select("*");
  if(error) return console.error(error);

  const tbody = document.querySelector("#teamsTable tbody");
  tbody.innerHTML = "";

  data.forEach(team => {
    const tr = document.createElement("tr");
    tr.classList.add(team.attendance ? 'present' : 'absent');

    tr.innerHTML = `
      <td>${team.team_id}</td>
      <td>${team.team_name}</td>
      <td>${team.email}</td>
      <td>
        <label class="toggle-switch">
          <input type="checkbox" ${team.attendance ? 'checked' : ''} onchange="toggleAttendance('${team.team_id}', this)">
          <span class="slider"></span>
        </label>
        <span id="status-${team.team_id}" class="ml-2">${team.attendance ? 'Present' : 'Absent'}</span>
      </td>
      <td><button onclick="viewID('${team.team_id}')">View ID</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// ---------------- Toggle Attendance ----------------
async function toggleAttendance(teamID, checkbox) {
  const statusSpan = document.getElementById(`status-${teamID}`);
  try {
    const { error } = await supabaseClient.from("teams")
      .update({ attendance: checkbox.checked })
      .eq("team_id", teamID);
    if(error) { alert("Error updating attendance"); console.error(error); checkbox.checked = !checkbox.checked; return; }
    statusSpan.textContent = checkbox.checked ? 'Present' : 'Absent';
    const tr = checkbox.closest('tr');
    tr.classList.toggle('present', checkbox.checked);
    tr.classList.toggle('absent', !checkbox.checked);
  } catch(err){ 
    console.error(err); 
    checkbox.checked = !checkbox.checked; 
  }
}

// ---------------- View ID Card ----------------
async function viewID(teamID){
  const { data, error } = await supabaseClient.from("teams").select("*").eq("team_id", teamID).single();
  if(error || !data) return alert("Team not found!");

  const membersInfo = [1,2,3,4].map(i=>{
    if(data['m'+i]) return `Member ${i}: ${data['m'+i]} - ${data['p'+i]}`;
    return '';
  }).filter(Boolean).join('<br>');

  const qrText = encodeURIComponent(`
Team Name: ${data.team_name}
Team ID: ${data.team_id}
${[1,2,3,4].map(i=>data['m'+i]?`Member ${i}: ${data['m'+i]} - ${data['p'+i]}`:'').filter(Boolean).join('\n')}
UTR: ${data.utr}
Email: ${data.email}
`);

  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${qrText}`;

  document.getElementById("idCardContent").innerHTML = `
    <span id="closeCard">✖</span>
    <h2 style="color:red">HellFired Club</h2>
    <p><strong>${data.team_name}</strong></p>
    <p>ID: ${data.team_id}</p>
    ${membersInfo}
    <p>UTR: ${data.utr}</p>
    <p>Email: ${data.email}</p>
    <img src="${qr}">
  `;
  document.getElementById("idCardModal").style.display = "flex";
  document.getElementById("closeCard").onclick = ()=>{ document.getElementById("idCardModal").style.display="none"; }
}

// ---------------- Initialize QR Scanner ----------------
function initQRScanner() {
  const html5QrcodeScanner = new Html5QrcodeScanner(
    "qr-reader", { fps:10, qrbox:250 }, false
  );
  html5QrcodeScanner.render(async (decodedText) => {
    try {
      const { error } = await supabaseClient.from("teams")
        .update({ attendance:true })
        .eq("team_id", decodedText);
      if(!error){ loadTeams(); }
    } catch(err){ console.error(err); }
  });
}
</script>

</body>
</html>
